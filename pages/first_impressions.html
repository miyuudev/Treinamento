<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2</title>
</head>
<body>
    <h2>My First JavaScript</h2>

    <button type="button" onclick="document.getElementById('demo').innerHTML= Date()">Click me</button>

    <p id="demo"></p>

    <h2>Changing HTML content</h2>

    <p id="demo2">JavaScript can change HTML content.</p>

    <button type="button" onclick="document.getElementById('demo2').innerHTML = 'Hello JavaScript, this paragraph has changed!!'">Try it</button>

    <h2>Changing attribute values</h2>

    <img src="https://www.w3schools.com/js/pic_bulboff.gif" alt="lamp" id="lamp" style="width: 100px;">


    <p>
        <button onclick="document.getElementById('lamp').src='https://www.w3schools.com/js/pic_bulbon.gif'">Turn on the light</button>
        <button onclick="document.getElementById('lamp').src='https://www.w3schools.com/js/pic_bulboff.gif'">Turn off the light</button>
    </p>


    <h2>Displays</h2>
    <nav>

        <a href="#innerHTML">innerHTML</a>
        <a href="#txtContent">textContent</a>
        <a href="#btnPrompt">windowPrompt</a>
    </nav>
    
    <section>
        <div>
            <div id="innerHTML">
                <h3>InnerHTML</h3>
                <p id="inner"></p>
            </div>
            <div id="textContent" >
                <h3>Document.write()</h3>
                <button onclick="document.write('Oi')">Do not click me</button>
            </div>
            <div id="btnPrompt">
                <h3>Window.prompt()</h3>
                <p></p>
                <button id="prompt">Click me</button>
            </div>
        </div>
    </section>
   
    <p><a href="../index.html">Voltar</a></p>
    <script>
        document.getElementById("inner").innerHTML = "Chenge the HTML content using <b>innerHTML</b>"
        document.getElementById("prompt").addEventListener("click", () => {
            const nome = prompt("Your Name? 🔥");

            if (nome) {
                alert("Welcome " + nome + " 👋");
  }
        });
</script>
</body>
</html>
